    <style>
        /* Bổ sung một chút cho trang sản phẩm riêng */
        .product-page {
            padding-top: 120px; /* Để không bị Header che mất */
            background: var(--dark-color);
            min-height: 100vh;
            color: var(--white-color);
        }
        .product-grid {
            display: grid;
            /* Tự động chia cột đều nhau, tối thiểu 250px mỗi cột */
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); 
            gap: 20px;
            width: 100%;
        }

        .product-card {
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* Đẩy nút bấm xuống đáy thẻ */
            height: 100%; /* Giúp các thẻ trong cùng 1 hàng có độ cao bằng nhau */
            background: #1a1a1a;
            padding: 15px;
            border-radius: 10px;
            transition: 0.3s ease;
        }
        .product-card:hover {
            transform: translateY(-10px);
            border-color: var(--secondary-color);
        }
        .product-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            margin-bottom: 15px;
        }
        .price {
            color: var(--secondary-color);
            font-size: var(--font-size-l);
            font-weight: var(--font-weight-bold);
            margin: 10px 0;
        }
        .buy-btn {
            background: var(--secondary-color);
            color: var(--primary-color);
            padding: 8px 20px;
            border-radius: var(--border-radius-m);
            font-weight: var(--font-weight-semibold);
            display: inline-block;
            margin-top: 10px;
        }
    </style>
</head>
